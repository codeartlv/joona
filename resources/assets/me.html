<form data-bind="components.form" action="me.json" class="modal-content">
	<div class="modal-header">
		<h5 class="modal-title">My profile</h5>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
			<i class="material-symbols-outlined">close</i>
		</button>
	</div>
	<div class="modal-body">
		<div class="modal-inner">
			<div data-role="form.response"></div>

			<div class="block">
				<div class="form-split">
					<span>Profile data</span>
				</div>

				<div class="form-group required">
					<label>Username:</label>
					<input class="form-control" type="text" readonly disabled value="admin" />
				</div>
				<div class="row">
					<div class="col-12 col-md-6">
						<div class="form-group required">
							<label>First name:</label>
							<input class="form-control" type="text" name="first_name" autocomplete="name" />
						</div>
					</div>
					<div class="col-12 col-md-6">
						<div class="form-group required">
							<label>Last name:</label>
							<input class="form-control" type="text" name="last_name" autocomplete="family-name" />
						</div>
					</div>
				</div>
				<div class="form-group mb-0 required">
					<label>E-mail:</label>
					<input class="form-control" type="email" name="email" autocomplete="email" />
				</div>
			</div>
		</div>
	</div>
	<div class="modal-footer">
		<section>
			<button type="button" data-bind="admin.change-my-password" class="btn btn-outline-secondary">
				<i class="material-symbols-outlined">password</i>
				Change password
			</button>
		</section>
		<section>
			<button type="submit" class="btn btn-primary">
				<i class="material-symbols-outlined">check</i>
				Save
			</button>
		</section>
	</div>
</form>
