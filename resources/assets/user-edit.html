<form data-bind="components.form" action="me.json" class="modal-content">
	<div class="modal-header">
		<h5 class="modal-title">Edit user</h5>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
			<i class="material-symbols-outlined">close</i>
		</button>
	</div>
	<div class="modal-body" data-bind="admin.user-edit-form">
		<div class="modal-inner">
			<div data-role="form.response"></div>

			<div class="block">
				<div class="form-split">
					<span>Profile data</span>
				</div>

				<div class="form-group required">
					<label>Username:</label>
					<input class="form-control" type="text" value="" />
				</div>

				<div class="row">
					<div class="col-12 col-md-6">
						<div class="form-group required">
							<label>First name:</label>
							<input class="form-control" type="text" name="first_name" autocomplete="name" />
						</div>
					</div>
					<div class="col-12 col-md-6">
						<div class="form-group required">
							<label>Last name:</label>
							<input class="form-control" type="text" name="last_name" autocomplete="family-name" />
						</div>
					</div>
				</div>

				<div class="form-group required">
					<label>Email:</label>
					<input class="form-control" type="email" name="email" autocomplete="email" />
				</div>

				<div class="form-split">
					<span>Permissions</span>
				</div>

				<div class="form-group required">
					<label>Level:</label>
					<select class="form-select" name="level" data-role="level-toggle">
						<option value="admin">Administrator</option>
						<option value="user">User</option>
					</select>
				</div>

				<div class="form-group d-none" data-toggle="level" data-level="user">
					<label>User roles</label>
					<div class="form-check">
						<input class="form-check-input" type="checkbox" value="" id="group1">
						<label class="form-check-label" for="group1">
							Group 1
						</label>
					</div>
					<div class="form-check">
						<input class="form-check-input" type="checkbox" value="" id="group2">
						<label class="form-check-label" for="group2">
							Group 2
						</label>
					</div>
					<div class="form-check">
						<input class="form-check-input" type="checkbox" value="" id="group3">
						<label class="form-check-label" for="group3">
							Group 3
						</label>
					</div>
				</div>

				<div class="form-group required">
					<label>Status:</label>
					<select class="form-select" name="status">
						<option value="active">Active</option>
						<option value="blocked">Blocked</option>
					</select>
				</div>

				<div class="form-split">
					<span>Password</span>
				</div>

				<div class="block">
					<div class="form-check">
						<input class="form-check-input" type="radio" data-role="pass-setup" value="no-change" checked name="password_setup" id="pass_no_change">
						<label class="form-check-label" for="pass_no_change">
							Don't change password
						</label>
					</div>
					<div class="form-check">
						<input class="form-check-input" type="radio" data-role="pass-setup" value="generate" name="password_setup" id="pass_email">
						<label class="form-check-label" for="pass_email">
							Generate new password and send via e-mail
						</label>
					</div>
					<div class="form-check">
						<input class="form-check-input" type="radio" data-role="pass-setup" value="set-password" name="password_setup" id="pass_set_manual">
						<label class="form-check-label" for="pass_set_manual">
							Change password
						</label>
					</div>
				</div>

				<div class="d-none block form-group mb-0" data-role="password-input">
					{% include "resources/assets/templates/components/password-validator.html"  %}
				</div>
			</div>
		</div>
	</div>
	<div class="modal-footer">
		<button type="submit" class="btn btn-primary">
			<i class="material-symbols-outlined">check</i>
			Save
		</button>
	</div>
</form>
