<form data-bind="components.form" class="modal-content">
	<div class="modal-header">
		<h5 class="modal-title">Change password</h5>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
			<i class="material-symbols-outlined">close</i>
		</button>
	</div>
	<div class="modal-body">
		<div class="modal-inner">
			<div data-role="form.response"></div>

			<div class="block">
				<div class="form-group required">
					<label>Current password:</label>
					<input class="form-control" type="password" name="current_password" autocomplete="current-password" />
				</div>

				<div class="form-group required">
					<label>New password:</label>
					{% include "resources/assets/templates/components/password-validator.html"  %}
				</div>
			</div>
		</div>
	</div>
	<div class="modal-footer">
		<button type="submit" class="btn btn-primary">
			<i class="material-symbols-outlined">check</i>
			Save
		</button>
	</div>
</form>
